<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rafting Project</title>
    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>


    <header>
        <div class="container-header">
            <img src="images/z-splash.png" alt="WWR Rafting Logo">
            <nav>
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="trips.html">Trips</a></li>
                    <li><a href="about.html">About</a></li>
                    <li><a href="contact.html">Contact</a></li>
                </ul>
            </nav>
        </div>
    </header>


    <section class="hero">
        <img src="images/rafting59_600.jpg" alt="Whitewater rafting adventure">
        <h1>Experience the Thrill of Whitewater Rafting!</h1>
        <article>
            <p>Join us for an unforgettable adventure!</p>
            <img src="images/z-splash.png" alt="Rafting icon">
        </article>
        <a href="trips.html" class="cta-button">See Our Trips</a>
    </section>


    <section>
        <h2>Sign Up for Our Newsletter</h2>
        <form action="#" method="post">
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" required>

            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required>

            <button type="submit">Subscribe</button>
        </form>
    </section>


    <section class="adventures">
        <figure>
            <img src="images/rafting1.jpg" alt="Rafting descent">
            <figcaption>
                <h3>Our Mission</h3>
                <p>Discover the excitement and adventure of whitewater rafting in stunning locations.</p>
            </figcaption>
        </figure>
        <figure>
            <img src="images/rafting2.jpg" alt="Rafting team">
            <figcaption>
                <h3>Our Offers</h3>
                <p>Trips for all skill levels, from beginners to experts, guided by certified instructors.</p>
            </figcaption>
        </figure>
    </section>


    <footer>
        <p>&copy; 2025 WWR Rafting. All rights reserved.</p>
        <div class="socialmedia">
            <a href="#"><img src="images/facebook.png" alt="Facebook"></a>
            <a href="#"><img src="images/instagram.png" alt="Instagram"></a>
            <a href="#"><img src="images/twitter.png" alt="Twitter"></a>
        </div>
    </footer>

</body>

</html>
