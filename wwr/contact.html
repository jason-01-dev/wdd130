<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Contact Rafting Company for reservations, questions, or information about our rafting adventures.">
    <meta name="author" content="Ariel Tshibangu Mubengayi">
    <link rel="stylesheet" href="styles/rafting.css">
    <title>Contact Us | Rafting Company</title>
</head>

<body>


    <header>
        <div class="container-header">
            <img src="images/z-splash.png" alt="Rafting Company Logo">

            <nav>
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="about.html">About Us</a></li>
                    <li><a href="trips.html">Trips</a></li>
                    <li><a href="contact.html" class="active">Contact Us</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>

        <section class="company-info">
            <h1>White Water Rafting Company</h1>
            <p>123 justice <br>
                Gombe, California<br>
                +243 999 999 9999<br>
                <a href="mailto:ariel243tshibangu@gmail.com">ariel243tshibangu@gmail.com</a>
            </p>
        </section>


        <section class="contact-grid">

            <div class="map">
                <iframe
                    src="https://www.google.com/maps/embed?pb=!1m16!1m12!1m3!1d3978.52435634057!2d15.287826944407456!3d-4.3120796002926625!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!2m1!1savenue%20de%20la%20justice!5e0!3m2!1sfr!2scd!4v1759499525181!5m2!1sfr!2scd"
                    allowfullscreen loading="lazy" referrerpolicy="no-referrer-when-downgrade">
                </iframe>

            </div>


            <form action="#" method="post" class="contact-form">
                <label for="name">Name</label>
                <input type="text" id="name" name="name" placeholder="Your full name" required>

                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="Your email address" required>

                <fieldset>
                    <legend>Message Purpose</legend>
                    <label><input type="radio" name="purpose" value="general" required> General Inquiry</label><br>
                    <label><input type="radio" name="purpose" value="reservation"> Reservation Question</label><br>
                    <label><input type="radio" name="purpose" value="website"> Website Suggestion</label>
                </fieldset>

                <label for="message">Message</label>
                <textarea id="message" name="message" rows="5" placeholder="Type here..."></textarea>

                <label>
                    <input type="checkbox" name="newsletter"> Please subscribe me to the monthly newsletter
                </label>

                <button type="submit">Get in Touch!</button>
            </form>
        </section>


        <section class="">
            <h2>We Are Here to Serve You</h2>
            <div class="adventures">
                <figure>
                    <img src="images/rafting64_1024.jpg" alt="Employee 1">
                    <figcaption>John Doe - Guide</figcaption>
                </figure>
                <figure>
                    <img src="images/rafting19_600.jpg" alt="Employee 2">
                    <figcaption>Jane Smith - Safety Expert</figcaption>
                </figure>
                <figure>
                    <img src="images/rafting22_600.jpg" alt="Employee 3">
                    <figcaption>Mike Johnson - Customer Service</figcaption>
                </figure>
            </div>
        </section>
    </main>


    <footer>
        <p>© 2025 Rafting Company | Ariel Tshibangu Mubengayi</p>
        <nav class="socialmedia">
            <a href="#"><img src="images/facebook.png" alt="Facebook"></a>
            <a href="#"><img src="images/twitter.png" alt="Twitter"></a>
            <a href="#"><img src="images/instagram.png" alt="Instagram"></a>
        </nav>
    </footer>

</body>

</html>
